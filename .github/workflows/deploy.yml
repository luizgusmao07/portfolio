name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /portfolio/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment release
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_URL: https://luizgusmao07.github.io/portfolio/
        run: |
          tag="deploy-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "Deploy ${tag}" \
            --notes "Automated release generated after a successful GitHub Pages deployment.\n\nCommit: ${GITHUB_SHA}\nProduction: ${DEPLOY_URL}"
